exec "systemctl --user import-environment DISPLAY WAYLAND_DISPLAY SWAYSOCK XDG_CURRENT_DESKTOP && dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY SWAYSOCK XDG_CURRENT_DESKTOP=sway && systemctl --user start sway-session.target"

# Headless/Server stuff
exec clipse --listen
exec swayosd-server
exec musicpresence
exec kdeconnectd
exec lxpolkit
exec swaync

# Desktop Apps
bar {
    swaybar_command waybar
}
exec feishin
exec vesktop
exec zen-browser

# Notification "daemons"
exec ~/.config/sway/scripts/notifiers/bluetooth_notifier.sh
