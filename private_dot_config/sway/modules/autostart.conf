# Import Wayland variables so Sunshine can see the screen
exec systemctl --user import-environment DISPLAY WAYLAND_DISPLAY SWAYSOCK XDG_CURRENT_DESKTOP

# Announce that Sway is fully loaded, triggering Sunshine immediately
exec systemctl --user start sway-session.target
# Myb stuff for discord streaming idk
exec dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=sway

# Headless/Server stuff
exec clipse --listen
exec swayosd-server
exec musicpresence
exec kdeconnectd
exec lxpolkit
exec swaync

# Desktop Apps
exec waybar
exec feishin
exec vesktop
exec zen-browser
